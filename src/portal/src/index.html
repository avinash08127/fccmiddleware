<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Puma Energy FCC Portal</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    .app-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }
    .app-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .app-splash img {
      width: 140px;
      height: 140px;
      object-fit: contain;
    }
    .app-splash__title {
      margin-top: 16px;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #E30613;
      letter-spacing: 0.02em;
    }
    .app-splash__subtitle {
      margin-top: 4px;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="app-splash" class="app-splash">
    <img src="AppIcon.png" alt="Puma Energy">
    <div class="app-splash__title">Puma Energy</div>
    <div class="app-splash__subtitle">FCC Portal</div>
  </div>
  <app-root></app-root>
  <script>
    // Hide splash when Angular app has bootstrapped
    document.addEventListener('DOMContentLoaded', function() {
      var check = setInterval(function() {
        var root = document.querySelector('app-root');
        if (root && root.children.length > 0) {
          var splash = document.getElementById('app-splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function() { splash.remove(); }, 500);
          }
          clearInterval(check);
        }
      }, 100);
    });
  </script>
</body>
</html>
