name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build + Test
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cloud

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore FccMiddleware.sln

      - name: Build
        run: dotnet build FccMiddleware.sln --no-restore -c Release

      - name: Unit Tests
        run: |
          dotnet test FccMiddleware.sln \
            --no-build \
            -c Release \
            --filter "FullyQualifiedName!~IntegrationTests" \
            --logger "trx;LogFileName=unit-tests.trx" \
            --results-directory ./TestResults

      - name: Integration Tests
        run: |
          dotnet test tests/FccMiddleware.IntegrationTests/FccMiddleware.IntegrationTests.csproj \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=integration-tests.trx" \
            --results-directory ./TestResults

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src/cloud/TestResults/

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker Build  (runs after tests pass; images are not pushed — Phase 6)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build \
            -f src/cloud/Dockerfile.api \
            -t fcc-middleware-api:${{ github.sha }} \
            src/cloud/

      - name: Build Worker image
        run: |
          docker build \
            -f src/cloud/Dockerfile.worker \
            -t fcc-middleware-worker:${{ github.sha }} \
            src/cloud/
