name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build + Test
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cloud

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore FccMiddleware.sln

      - name: Build
        run: dotnet build FccMiddleware.sln --no-restore -c Release

      - name: Unit Tests
        run: |
          dotnet test FccMiddleware.sln \
            --no-build \
            -c Release \
            --filter "FullyQualifiedName!~IntegrationTests" \
            --logger "trx;LogFileName=unit-tests.trx" \
            --results-directory ./TestResults

      - name: Integration Tests
        run: |
          dotnet test tests/FccMiddleware.IntegrationTests/FccMiddleware.IntegrationTests.csproj \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=integration-tests.trx" \
            --results-directory ./TestResults

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src/cloud/TestResults/

  # ─────────────────────────────────────────────────────────────────────────────
  # Angular Portal — Lint / Build / Test
  # ─────────────────────────────────────────────────────────────────────────────
  portal-ci:
    name: Portal CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build -- --configuration=production

      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

  # ─────────────────────────────────────────────────────────────────────────────
  # Edge Agent — Build / Lint / Test
  # ─────────────────────────────────────────────────────────────────────────────
  edge-agent-ci:
    name: Edge Agent CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/edge-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble Debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Verify Room schema export
        run: |
          SCHEMA_DIR="app/schemas/com.fccmiddleware.edge.buffer.BufferDatabase"
          if [ ! -d "$SCHEMA_DIR" ] || [ -z "$(ls -A "$SCHEMA_DIR" 2>/dev/null)" ]; then
            echo "ERROR: Room schema not exported to $SCHEMA_DIR"
            exit 1
          fi
          echo "Room schema export verified: $(ls "$SCHEMA_DIR")"

      - name: Run detekt lint
        run: ./gradlew detekt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-agent-test-results
          path: src/edge-agent/app/build/reports/

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker Build  (runs after tests pass; images are not pushed — Phase 6)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build \
            -f src/cloud/Dockerfile.api \
            -t fcc-middleware-api:${{ github.sha }} \
            src/cloud/

      - name: Build Worker image
        run: |
          docker build \
            -f src/cloud/Dockerfile.worker \
            -t fcc-middleware-worker:${{ github.sha }} \
            src/cloud/
